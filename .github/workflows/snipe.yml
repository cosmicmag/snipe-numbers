name: snipe-numbers alert bot

# Публичный репо = безлимит Actions-минут. Гоняем ДЛИННЫЙ loop-джоб (тик каждые 45с),
# который живёт до ~5.8ч; расписание каждые 30 мин рестартит его (cancel-in-progress),
# так что всегда крутится ровно один свежий инстанс. Если GH дропнет триггер — текущий
# джоб доживает по таймауту до 350 мин, гэпа нет.

on:
  schedule:
    - cron: "17 * * * *"     # раз в час (не :00 — там пик нагрузки GH); рестарт мягкий
  workflow_dispatch: {}

concurrency:
  group: snipe-bot
  cancel-in-progress: true   # новый триггер гасит старый → всегда один инстанс

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # бэкстоп, если расписание задержится
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore dedup state
        uses: actions/cache@v4
        with:
          path: state.json
          key: snipe-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            snipe-state-

      - name: Run alert bot (loop)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GG_AUTH_TOKEN: ${{ secrets.GG_AUTH_TOKEN }}   # сессия Getgems для чтения офферов
          GG_JWT: ${{ secrets.GG_JWT }}
          MIN_OFFER_PROFIT: "40"   # окно оффера: алерт если NET ≥ 40 TON
          TICK_SECONDS: "15"    # тик каждые 15 секунд
          GG_FETCH: "100"       # 2 страницы — флор ловится уже на 1-й, запас на сдвиг сортировки
          FRAG_FETCH: "60"
          FEE_SELL: "0.10"
          MIN_NET_TON: "30"
          FLOOR_PCT: "0"        # порог = ровно флор (без надбавки): алерт только по флору или ниже
          UNDERCUT_PCT: "4.5"   # 🔻 ПОД ФЛОРОМ: новый листинг ниже прежнего флора на ≥4.5%
          FLOOR_MAX: "0"        # 0 = только флор+%; поставь напр. "1600" чтобы слать всё дешевле
          FRAG_AUCTIONS: "1"    # 💎 сканить аукционы Fragment на снайп ниже флора класса
          AUC_TTL: "180"        # пересобирать стакан+аукционы раз в 180с (не каждый тик)
          UNDERCUT: "0.03"      # перевыставляем на 3% ниже флора класса, чтоб реально ушло
          MIN_PROFIT: "150"     # минимум чистыми TON, чтоб алертить аукцион
          MIN_COMPS: "3"        # минимум живых листингов класса, чтоб верить его флору
          ENDS_DAYS: "14"       # игнорить аукционы, кончающиеся позже (ставку ещё перебьют)
        run: python alert_bot.py
