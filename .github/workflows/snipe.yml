name: snipe-numbers alert bot

# Публичный репо = безлимит Actions-минут. Гоняем ДЛИННЫЙ loop-джоб (тик каждые 45с),
# который живёт до ~5.8ч; расписание каждые 30 мин рестартит его (cancel-in-progress),
# так что всегда крутится ровно один свежий инстанс. Если GH дропнет триггер — текущий
# джоб доживает по таймауту до 350 мин, гэпа нет.

on:
  schedule:
    - cron: "17 * * * *"     # раз в час (не :00 — там пик нагрузки GH); рестарт мягкий
  workflow_dispatch: {}

concurrency:
  group: snipe-bot
  cancel-in-progress: true   # новый триггер гасит старый → всегда один инстанс

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # бэкстоп, если расписание задержится
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore dedup state
        uses: actions/cache@v4
        with:
          path: state.json
          key: snipe-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            snipe-state-

      - name: Run alert bot (loop)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TICK_SECONDS: "15"    # тик каждые 15 секунд
          GG_FETCH: "100"       # 2 страницы — флор ловится уже на 1-й, запас на сдвиг сортировки
          FRAG_FETCH: "60"
          MARGIN: "0.15"
          FEE_SELL: "0.10"
          MIN_NET_TON: "30"
          FLOOR_PCT: "1.5"      # порог = флор * (1 + 1.5%)
          FLOOR_MAX: "0"        # 0 = только флор+%; поставь напр. "1600" чтобы слать всё дешевле
        run: python alert_bot.py
